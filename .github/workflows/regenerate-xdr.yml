name: Regenerate XDR

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC; adjustable (e.g. weekly). Runs from `main`.
  workflow_dispatch:        # manual "Run workflow" button for use right after an upstream merge

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: stellar/actions/rust-cache@main   # same cache action the repo already uses
      - run: rustup update

      # Fast-forward the xdr submodule to the latest commit on stellar/stellar-xdr@main.
      # Read the previously pinned commit (from the committed xdr-version) first so we can
      # tell whether upstream actually moved and skip the rest of the job if it did not.
      - name: Update xdr submodule to latest upstream
        id: xdr
        run: |
          before="$(cat xdr-version)"
          git submodule update --remote xdr
          after="$(git -C xdr rev-parse HEAD)"
          echo "before=$before"
          echo "after=$after"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream change; nothing to regenerate."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git -C xdr rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # Generate the Rust source (no crate compile yet) and record the new xdr-version.
      - name: Regenerate sources
        if: steps.xdr.outputs.changed == 'true'
        run: make clean generate-files xdr-version

      # Register any new XDR feature gates (e.g. a newly added cap_XXXX) in Cargo.toml and
      # src/lib.rs, so the crate compiles and reports the gate. No-op when none are new.
      - name: Register new XDR feature flags
        if: steps.xdr.outputs.changed == 'true'
        run: python3 .github/scripts/sync-xdr-features.py

      # Now compile: xdr-json builds the crate (with -Dwarnings) and emits the JSON schemas.
      # cargo test gives a single-config validation; the full feature-powerset matrix in
      # rust.yml runs once this PR is merged to main.
      - name: Generate JSON schemas and validate
        if: steps.xdr.outputs.changed == 'true'
        run: |
          make xdr-json
          cargo test --all-features

      - name: Open or update PR
        if: steps.xdr.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/regenerate-xdr
          base: main
          delete-branch: true
          title: "Regenerate XDR from upstream stellar-xdr (${{ steps.xdr.outputs.sha }})"
          commit-message: "Regenerate XDR from upstream stellar-xdr (${{ steps.xdr.outputs.sha }})"
          body: |
            Automated regeneration of the Rust XDR bindings from the latest
            `stellar/stellar-xdr@main` (`${{ steps.xdr.outputs.sha }}`).

            Generated by the `Regenerate XDR` workflow:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Steps that ran: `make generate-files`, feature-flag sync, `make xdr-json`,
            `cargo test --all-features`. If new feature gates were added, they were
            registered in `Cargo.toml` and `src/lib.rs` automatically — please sanity-check.
          add-paths: |
            src/generated.rs
            src/generated
            xdr
            xdr-version
            xdr-json
            Cargo.toml
            src/lib.rs
