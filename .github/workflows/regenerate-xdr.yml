name: Regenerate XDR

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC; adjustable (e.g. weekly). Runs from `main`.
  workflow_dispatch:        # manual "Run workflow" button for use right after an upstream merge

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: stellar/actions/rust-cache@main   # same cache action the repo already uses
      - run: rustup update

      # Fast-forward the xdr submodule to the latest commit on stellar/stellar-xdr@main
      - name: Update xdr submodule to latest upstream
        run: git submodule update --remote xdr

      - name: Capture upstream version
        id: xdr
        run: echo "sha=$(git -C xdr rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Regenerate src/generated.rs, src/generated/, xdr-version, xdr-json/
      - name: Regenerate
        run: make clean generate

      # Pre-validate so the PR is trustworthy even though GITHUB_TOKEN won't auto-run rust.yml
      - name: Build and test
        run: make build test

      - name: Open or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/regenerate-xdr
          base: main
          delete-branch: true
          title: "Regenerate XDR from upstream stellar-xdr (${{ steps.xdr.outputs.sha }})"
          commit-message: "Regenerate XDR from upstream stellar-xdr (${{ steps.xdr.outputs.sha }})"
          body: |
            Automated regeneration of the Rust XDR bindings from the latest
            `stellar/stellar-xdr@main` (`${{ steps.xdr.outputs.sha }}`).

            Generated by the `Regenerate XDR` workflow:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            `make clean generate` + `make build test` passed in that run.
          add-paths: |
            src/generated.rs
            src/generated
            xdr
            xdr-version
            xdr-json
