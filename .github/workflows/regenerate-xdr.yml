name: Regenerate XDR

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC; adjustable (e.g. weekly). Runs from `main`.
  workflow_dispatch:        # manual "Run workflow" button for use right after an upstream merge

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: stellar/actions/rust-cache@main   # same cache action the repo already uses
      - run: rustup update

      # Fast-forward the xdr submodule to the latest commit on stellar/stellar-xdr@main.
      # Read the previously pinned commit (from the committed xdr-version) first so we can
      # tell whether upstream actually moved and skip the rest of the job if it did not.
      - name: Update xdr submodule to latest upstream
        id: xdr
        run: |
          before="$(cat xdr-version)"
          git submodule update --remote xdr
          after="$(git -C xdr rev-parse HEAD)"
          echo "before=$before"
          echo "after=$after"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream change; nothing to regenerate."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git -C xdr rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # Generate the Rust source (no crate compile yet) and record the new xdr-version.
      - name: Regenerate sources
        if: steps.xdr.outputs.changed == 'true'
        run: make clean generate-files xdr-version

      # Register any new XDR feature gates (e.g. a newly added cap_XXXX) in Cargo.toml and
      # src/lib.rs, so the crate compiles and reports the gate. No-op when none are new.
      - name: Register new XDR feature flags
        if: steps.xdr.outputs.changed == 'true'
        run: python3 .github/scripts/sync-xdr-features.py

      # Now compile: xdr-json builds the crate (with -Dwarnings) and emits the JSON schemas.
      # cargo test gives a single-config validation; the full feature-powerset matrix in
      # rust.yml runs once this PR is merged to main.
      - name: Generate JSON schemas and validate
        if: steps.xdr.outputs.changed == 'true'
        run: |
          make xdr-json
          cargo test --all-features

      # Commit the regenerated files (including the xdr submodule pointer) onto a rolling
      # branch and open a PR if one isn't already open. Done with plain git + gh rather than
      # a PR action because those rebase internally and can't merge submodule pointer changes.
      - name: Open or update PR
        if: steps.xdr.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.xdr.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          BRANCH=auto/regenerate-xdr
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # -A so deletions are staged too (e.g. if upstream removes a generated type/file).
          git add -A -- src/generated.rs src/generated xdr xdr-version xdr-json Cargo.toml src/lib.rs
          if git diff --cached --quiet; then
            echo "No tracked changes to commit; nothing to do."
            exit 0
          fi
          git commit -m "Regenerate XDR from upstream stellar-xdr ($SHA)"
          # Rolling branch: force-push so re-runs refresh the same PR as upstream advances.
          git push --force origin "$BRANCH"
          body=$(printf '%s\n' \
            "Automated regeneration of the Rust XDR bindings from the latest" \
            "\`stellar/stellar-xdr@main\` (\`$SHA\`)." \
            "" \
            "Generated by the \`Regenerate XDR\` workflow: $RUN_URL" \
            "" \
            "Steps that ran: \`make generate-files\`, feature-flag sync, \`make xdr-json\`," \
            "\`cargo test --all-features\`. Any new feature gates were registered in" \
            "\`Cargo.toml\` and \`src/lib.rs\` automatically — please sanity-check.")
          if [ -z "$(gh pr list -R "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')" ]; then
            gh pr create -R "$GITHUB_REPOSITORY" --base main --head "$BRANCH" \
              --title "Regenerate XDR from upstream stellar-xdr ($SHA)" --body "$body"
          else
            echo "Existing PR for $BRANCH refreshed by force-push."
          fi
